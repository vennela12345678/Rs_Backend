<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success! - Admin Portal</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --admin-primary: #2B7FFF;
            --admin-secondary: #00E676;
            --admin-bg: #F7FAFC;
        }
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--admin-bg);
        }
        .app-screen {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }
        
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            box-sizing: border-box;
            border-bottom: 5px solid var(--admin-secondary);
            text-align: center;
        }
        
        .icon-box {
            width: 80px;
            height: 80px;
            background: #E8FFF3;
            color: var(--admin-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 30px auto;
            box-shadow: 0 10px 20px rgba(0, 230, 118, 0.1);
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .title { color: #1A202C; font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
        .subtitle { color: #718096; font-size: 1rem; line-height: 1.6; margin-bottom: 40px; }
        
        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: var(--admin-primary);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(43, 127, 255, 0.2);
            transition: all 0.3s;
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(43, 127, 255, 0.3); background: #1D70F5; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-screen">
        <div class="container">
            <div class="card">
                <div class="icon-box">
                    <i class="fas fa-check-shield"></i>
                </div>
                
                <h2 class="title">Reset Successful!</h2>
                <p class="subtitle">Your administrator credentials have been securely updated. You can now use your new password to access the portal.</p>

                <form action="/admin_login" method="GET">
                    <button type="submit" class="btn-primary">Return to Login</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
