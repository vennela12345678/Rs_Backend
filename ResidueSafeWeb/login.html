<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ResidueSafe</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #1a202c; /* Fallback */
        }
        .app-screen {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .header-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            z-index: 100;
        }
        .back-btn {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            text-decoration: none;
        }
        
        /* Ensures the background stays fixed behind scrollable content */
        .fixed-bg {
            position: fixed !important;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
        }
        
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }
        
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .brand-logo-box {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .brand-logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }
        
        .brand-title {
            color: white;
            font-size: 2rem;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .portal-label {
            color: rgba(255,255,255,0.9);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 30px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        
        .welcome-text {
            color: #1A202C;
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
        }
        
        .welcome-sub {
            color: #718096;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-label {
            display: block;
            color: #1A202C;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            color: #4A5568;
            font-size: 1.1rem;
        }
        
        .form-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid #E2E8F0;
            border-radius: 15px;
            font-size: 1rem;
            font-family: inherit;
            color: #1A202C;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.1);
        }
        
        .forgot-pass {
            display: block;
            text-align: right;
            color: #4CAF50;
            font-weight: 700;
            font-size: 0.85rem;
            text-decoration: none;
            margin-bottom: 25px;
        }
        
        .btn-signin {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(to right, #4CAF50, #81C784);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(76,175,80,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
            margin-bottom: 25px;
        }
        
        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(76,175,80,0.4);
        }
        
        .new-user {
            text-align: center;
            color: #718096;
            font-size: 0.95rem;
        }
        
        .new-user a {
            color: #4CAF50;
            font-weight: 700;
            text-decoration: none;
        }
        
        .disclaimer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 0 20px;
        }
        .disclaimer strong {
            color: #ff6b6b;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Beautiful green blurred farm background fixed to screen -->
    <div class="hero-bg-blur fixed-bg"></div>

    <div class="app-screen">
        <!-- Back Navigation -->
        <div class="header-nav">
            <a href="/role" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        </div>

        <div class="login-container">
            <!-- App Logo Header -->
            <div class="brand-header">
                <div class="brand-logo-box">
                    <img src="/assets/logo.png" alt="Logo" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><circle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%23e0e0e0\'/><text x=\'50\' y=\'55\' font-family=\'sans-serif\' font-weight=\'bold\' font-size=\'30\' text-anchor=\'middle\' fill=\'%23888\'>RS</text></svg>';">
                </div>
                <span class="brand-title">ResidueSafe</span>
            </div>
            <div class="portal-label" id="portal-title">Farmer Portal</div>

            <!-- Login White Card -->
            <div class="login-card">
                <h2 class="welcome-text">Welcome Back! 👋</h2>
                <p class="welcome-sub">Sign in to manage your livestock treatments</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label class="input-label">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder="farmer@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                        </div>
                    </div>

                    <a href="/forgot_password" class="forgot-pass">Forgot Password?</a>

                    <button type="submit" class="btn-signin">Sign In</button>

                    <div class="new-user">
                        New user? <a href="/signup">Sign Up</a>
                    </div>
                </form>
            </div>

            <!-- Disclaimer mimics Android Role checks -->
            <div class="disclaimer" id="farmer-disclaimer">
                <strong>Disclaimer:</strong> ResidueSafe tracks withdrawal status for medicines. It does not issue Veterinary prescriptions. Always consult a veterinarian before medication.
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const emailRegex = /^[^\s@]+@[a-zA-Z]+(\.[a-zA-Z]+)+$/;
            if (!emailRegex.test(email)) {
                alert("Please enter a valid email address. After the '@' symbol, only letters and dots are allowed.");
                return;
            }

            const loginBtn = document.querySelector('.btn-signin');
            const originalText = loginBtn.textContent;
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const response = await fetch('http://127.0.0.1:5000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store user data for dashboard use
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('userRole', 'farmer');
                    
                    alert('Login successful! Redirecting to your dashboard...');
                    window.location.href = '/farmer_dashboard';
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (error) {
                console.error('Login Error:', error);
                alert('Connection to server failed. Please ensure the backend is running.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = originalText;
            }
        });
        
        // Simple script to adjust UI based on role passed in URL (e.g. ?role=admin)
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');
            
            if (role === 'admin') {
                document.getElementById('portal-title').textContent = 'Administrator Portal';
                document.getElementById('farmer-disclaimer').style.display = 'none';
            }
        });
    </script>
</body>
</html>
