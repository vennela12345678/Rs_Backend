<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - ResidueSafe</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Since it's a single screen */
            font-family: 'Inter', sans-serif;
        }
        .app-screen {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        .header-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            z-index: 100;
        }
        .back-btn {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .role-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease-out;
        }
        .role-title {
            color: white;
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 15px;
            line-height: 1.2;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .role-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .role-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            margin-bottom: 25px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .role-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }
        .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: white;
        }
        .icon-farmer {
            background-color: #4CAF50;
            box-shadow: 0 8px 15px rgba(76, 175, 80, 0.4);
        }
        .icon-admin {
            background-color: #2B7FFF;
            box-shadow: 0 8px 15px rgba(43, 127, 255, 0.4);
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1A202C;
            margin-bottom: 10px;
        }
        .card-desc {
            color: #718096;
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .continue-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1rem;
        }
        .continue-farmer {
            color: #4CAF50;
        }
        .continue-admin {
            color: #2B7FFF;
        }
    </style>
</head>
<body>

    <div class="app-screen">
        <!-- Reusing the beautiful green blurred farm background from style.css -->
        <div class="hero-bg-blur"></div>
        <div class="hero-overlay-light"></div>

        <!-- Back Navigation -->
        <div class="header-nav">
            <a href="/index" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        </div>

        <div class="role-container">
            <h1 class="role-title">Choose<br>Your Role</h1>
            <p class="role-subtitle">Select how you'll be using ResidueSafe</p>

            <a href="/login?role=farmer" class="role-card">
                <div class="icon-circle icon-farmer">
                    <i class="fas fa-tractor"></i>
                </div>
                <h2 class="card-title">Farmer</h2>
                <p class="card-desc">Track treatments and monitor withdrawal periods for your livestock</p>
                <div class="continue-btn continue-farmer">
                    Continue as Farmer <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <a href="/admin_login" class="role-card">
                <div class="icon-circle icon-admin">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h2 class="card-title">Administrator</h2>
                <p class="card-desc">Manage farmers, monitor compliance, and oversee system operations</p>
                <div class="continue-btn continue-admin">
                    Continue as Administrator <i class="fas fa-arrow-right"></i>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
