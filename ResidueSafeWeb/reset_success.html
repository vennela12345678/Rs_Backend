<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success! - ResidueSafe</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .app-screen {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }
        
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }
        
        .card {
            background: white;
            border-radius: 32px;
            padding: 50px 35px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            box-sizing: border-box;
            border: 1px solid #f1f5f9;
            text-align: center;
        }
        
        .icon-box {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #4CAF50, #22c55e);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            margin: 0 auto 30px auto;
            box-shadow: 0 15px 30px rgba(76,175,80,0.25);
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .title { color: #1A202C; font-size: 2rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
        .subtitle { color: #718096; font-size: 1.05rem; line-height: 1.6; margin-bottom: 40px; }
        
        .btn-primary {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 17px;
            background: linear-gradient(135deg, #4CAF50, #22c55e);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(76,175,80,0.3);
            transition: all 0.3s;
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(76,175,80,0.4); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-screen">
        <div class="container">
            <div class="card">
                <div class="icon-box">
                    <i class="fas fa-check"></i>
                </div>
                
                <h2 class="title">Password Reset! ✅</h2>
                <p class="subtitle">Your password has been successfully updated. You can now log in with your new credentials.</p>

                <form action="/login" method="GET">
                    <button type="submit" class="btn-primary">Back to Sign In</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
