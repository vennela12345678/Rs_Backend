<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ResidueSafe</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .app-screen {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }
        .header-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            z-index: 100;
        }
        .back-btn {
            color: #1A202C;
            font-size: 1.5rem;
            cursor: pointer;
            text-decoration: none;
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .back-btn:hover { transform: translateX(-5px); }
        
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }
        
        .card {
            background: white;
            border-radius: 32px;
            padding: 45px 35px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            box-sizing: border-box;
            border: 1px solid #f1f5f9;
            text-align: center;
        }
        
        .icon-box {
            width: 80px;
            height: 80px;
            background: #f0fdf4;
            color: #4CAF50;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 25px auto;
            box-shadow: 0 10px 20px rgba(76,175,80,0.1);
        }
        
        .title { color: #1A202C; font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
        .subtitle { color: #718096; font-size: 0.95rem; line-height: 1.6; margin-bottom: 35px; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-label { display: block; color: #1A202C; font-weight: 700; font-size: 0.85rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 18px; top: 18px; color: #94a3b8; font-size: 1.1rem; }
        
        .form-input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            background: #f8fafc;
            box-sizing: border-box;
        }
        
        .form-input:focus { outline: none; border-color: #4CAF50; background: white; box-shadow: 0 0 0 5px rgba(76,175,80,0.08); }
        
        .btn-primary {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 17px;
            background: linear-gradient(135deg, #4CAF50, #22c55e);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(76,175,80,0.3);
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(76,175,80,0.4); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-screen">
        <div class="header-nav">
            <a href="/otp_verification" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        </div>

        <div class="container">
            <div class="card">
                <div class="icon-box">
                    <i class="fas fa-lock"></i>
                </div>
                
                <h2 class="title">Create Password 🔑</h2>
                <p class="subtitle">Enter your new secure password below to regain access to your farmer portal.</p>

                <form id="resetForm">
                    <div class="input-group">
                        <label class="input-label">New Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="newPassword" class="form-input" placeholder="Min. 8 characters" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Reset Password</button>
                    
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = sessionStorage.getItem('resetEmail');
            if (!email) {
                alert("Session expired. Please restart the process.");
                window.location.href = '/forgot_password';
                return;
            }

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            const submitBtn = document.querySelector('.btn-primary');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const response = await fetch('http://127.0.0.1:5000/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Password reset successful!');
                    sessionStorage.removeItem('resetEmail');
                    window.location.href = '/reset_success';
                } else {
                    alert(data.message || 'Reset failed');
                }
            } catch (error) {
                console.error('Reset Error:', error);
                alert('Connection to server failed.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>

</body>
</html>
