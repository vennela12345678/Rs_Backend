<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Admin Portal</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --admin-primary: #2B7FFF;
            --admin-secondary: #00E676;
            --admin-bg: #F7FAFC;
        }
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--admin-bg);
        }
        .app-screen {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }
        .header-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            z-index: 100;
        }
        .back-btn {
            color: #1A202C;
            font-size: 1.25rem;
            cursor: pointer;
            text-decoration: none;
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .back-btn:hover { transform: translateX(-5px); }
        
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            box-sizing: border-box;
            border-bottom: 5px solid var(--admin-primary);
            text-align: center;
        }
        
        .icon-box {
            width: 70px;
            height: 70px;
            background: #EBF4FF;
            color: var(--admin-primary);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 25px auto;
        }
        
        .title { color: #1A202C; font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; }
        .subtitle { color: #718096; font-size: 0.9rem; line-height: 1.6; margin-bottom: 35px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-label { display: block; color: #4A5568; font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; }
        .input-container { position: relative; }
        .input-icon { position: absolute; left: 15px; top: 15px; color: #A0AEC0; font-size: 1.1rem; }
        
        .form-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s;
            background: #F8FAFC;
            box-sizing: border-box;
        }
        
        .form-input:focus { outline: none; border-color: var(--admin-primary); background: white; box-shadow: 0 0 0 4px rgba(43, 127, 255, 0.1); }
        
        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: var(--admin-primary);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(43, 127, 255, 0.2);
            transition: all 0.3s;
            margin-bottom: 25px;
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(43, 127, 255, 0.3); background: #1D70F5; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-screen">
        <div class="header-nav">
            <a href="/admin_otp_verification" class="back-btn" title="Back"><i class="fas fa-arrow-left"></i></a>
        </div>

        <div class="container">
            <div class="card">
                <div class="icon-box">
                    <i class="fas fa-key"></i>
                </div>
                
                <h2 class="title">New Credentials</h2>
                <p class="subtitle">Set a secure new password for your administrator account to regain full system access.</p>

                <form id="adminResetForm">
                    <div class="form-group">
                        <label class="form-label">Admin Password</label>
                        <div class="input-container">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="newPassword" class="form-input" placeholder="Min. 8 characters" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-container">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat secure password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Set New Password</button>
                    
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('adminResetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = sessionStorage.getItem('resetEmail');
            if (!email) {
                alert("Session expired.");
                window.location.href = '/admin_forgot_password';
                return;
            }

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            const submitBtn = document.querySelector('.btn-primary');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const response = await fetch('http://127.0.0.1:5000/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Admin credentials updated successfully!');
                    sessionStorage.removeItem('resetEmail');
                    window.location.href = '/admin_reset_success';
                } else {
                    alert(data.message || 'Update failed');
                }
            } catch (error) {
                console.error('Admin Reset Error:', error);
                alert('Connection to server failed.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Set New Password';
            }
        });
    </script>

</body>
</html>
