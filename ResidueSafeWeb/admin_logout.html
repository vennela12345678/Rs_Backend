<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout Confirmation - ResidueSafe Portal</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100%; margin: 0; font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1A365D 0%, #2B7FFF 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .logout-box {
            background: white; border-radius: 24px; width: 100%; max-width: 440px;
            padding: 50px 40px; text-align: center; box-shadow: 0 15px 45px rgba(0,0,0,0.2);
            animation: fadeIn 0.4s ease-out;
            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes fadeIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .icon-shield {
            width: 80px; height: 80px; background: #FFF5F5; color: #E53E3E;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; margin: 0 auto 25px;
        }
        
        h2 { font-size: 1.75rem; font-weight: 800; color: #1A202C; margin-bottom: 12px;}
        p { color: #718096; font-size: 1rem; margin-bottom: 35px; line-height: 1.5;}

        .btn-logout {
            width: 100%; padding: 16px; background: #E53E3E; color: white;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 800;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(229, 62, 62, 0.2);
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-logout:hover { background: #C53030; transform: translateY(-2px); }
        
        .btn-cancel {
            width: 100%; padding: 14px; background: #F7FAFC; color: #4A5568;
            border: 1px solid #E2E8F0; border-radius: 12px; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center;
        }
        .btn-cancel:hover { background: #EDF2F7; }
    </style>
</head>
<body>

    <div class="logout-box">
        <div class="icon-shield">
            <i class="fas fa-sign-out-alt"></i>
        </div>
        <h2>Sign Out</h2>
        <p>Are you sure you want to terminate your current administrative session? You will need to re-authenticate to gain access.</p>

        <form action="/role">
            <button type="submit" class="btn-logout">Terminate Session</button>
            <a href="/admin_dashboard" class="btn-cancel">Return to Headquarters</a>
        </form>
    </div>

</body>
</html>
