<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - ResidueSafe</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .app-screen {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }
        .header-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            z-index: 100;
        }
        .back-btn {
            color: #1A202C;
            font-size: 1.5rem;
            cursor: pointer;
            text-decoration: none;
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .back-btn:hover { transform: translateX(-5px); }
        
        .signup-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
            padding-top: 40px;
        }
        
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .brand-logo-box {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .brand-logo-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .brand-title {
            color: #1A202C;
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        
        .signup-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            box-sizing: border-box;
            border: 1px solid #f1f5f9;
        }
        
        .title-group { text-align: center; margin-bottom: 35px; }
        .welcome-text { color: #1A202C; font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .welcome-sub { color: #718096; font-size: 0.95rem; line-height: 1.5; }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .input-group { margin-bottom: 0; }
        .input-label { display: block; color: #1A202C; font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 16px; top: 18px; color: #94a3b8; font-size: 1rem; }
        
        .form-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            background: #f8fafc;
            box-sizing: border-box;
        }
        
        .form-input:focus { outline: none; border-color: #4CAF50; background: white; box-shadow: 0 0 0 4px rgba(76,175,80,0.1); }
        
        .terms-box {
            margin: 25px 0;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: #64748b;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        
        .terms-box input { margin-top: 3px; cursor: pointer; accent-color: #4CAF50; width: 18px; height: 18px; }
        .terms-box a { color: #4CAF50; font-weight: 700; text-decoration: none; }
        
        .btn-signup {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #4CAF50, #22c55e);
            color: white;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(76,175,80,0.25);
            transition: all 0.3s;
            margin-bottom: 25px;
        }
        
        .btn-signup:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(76,175,80,0.35); }
        
        .login-link { text-align: center; color: #64748b; font-size: 0.95rem; font-weight: 500; }
        .login-link a { color: #4CAF50; font-weight: 700; text-decoration: none; margin-left: 5px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .signup-card { padding: 30px 20px; }
            .welcome-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="app-screen">
        <div class="header-nav">
            <a href="/login" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        </div>

        <div class="signup-container">
            <div class="brand-header">
                <div class="brand-logo-box">
                    <img src="/assets/logo.png" alt="Logo" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><circle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%234CAF50\'/><text x=\'50\' y=\'55\' font-family=\'sans-serif\' font-weight=\'bold\' font-size=\'30\' text-anchor=\'middle\' fill=\'white\'>RS</text></svg>';">
                </div>
                <span class="brand-title">ResidueSafe</span>
            </div>

            <div class="signup-card">
                <div class="title-group">
                    <h2 class="welcome-text">Get Started! 🚀</h2>
                    <p class="welcome-sub">Create your account to start managing your farm safety and compliance.</p>
                </div>

                <form id="signupForm">
                    <div class="form-grid">
                        <div class="input-group">
                            <label class="input-label">Full Name *</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" id="fullName" class="form-input" placeholder="e.g. John Doe" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Farm Name *</label>
                            <div class="input-wrapper">
                                <i class="fas fa-tractor input-icon"></i>
                                <input type="text" id="farmName" class="form-input" placeholder="e.g. Green Pastures Farm" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Email Address *</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" id="email" class="form-input" placeholder="farmer@example.com" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Password *</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="password" class="form-input" placeholder="Minimum 8 characters" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Confirm Password *</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock-open input-icon"></i>
                                <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat password" required>
                            </div>
                        </div>
                    </div>

                    <div class="terms-box">
                        <input type="checkbox" id="terms" required checked>
                        <label for="terms">I agree to the <a href="/privacy">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>.</label>
                    </div>

                    <button type="submit" class="btn-signup">Create My Account</button>

                    <div class="login-link">
                        Already have an account?<a href="/login">Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const farmName = document.getElementById('farmName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            const emailRegex = /^(?=.*[a-zA-Z])(?=.*[0-9])[a-zA-Z0-9.]+@gmail\.com$/;
            if (!emailRegex.test(email)) {
                alert("Please enter a valid @gmail.com address. The part before '@' must contain a combination of letters and numbers, and only letters or only numbers are not accepted.");
                return;
            }

            const signupBtn = document.querySelector('.btn-signup');
            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating Account...';

            try {
                const response = await fetch('http://127.0.0.1:5000/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        full_name: fullName,
                        farm_name: farmName,
                        email: email,
                        password: password,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Registration successful! Please sign in.');
                    window.location.href = '/login';
                } else {
                    alert(data.message || 'Registration failed');
                }
            } catch (error) {
                console.error('Signup Error:', error);
                alert('Connection to server failed. Please ensure the backend is running.');
            } finally {
                signupBtn.disabled = false;
                signupBtn.textContent = 'Create My Account';
            }
        });
    </script>

</body>
</html>
